name: Build, Test and Container Scan

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: hmcts-dev-test-backend

jobs:
  build-and-test:
    name: Build, Test and Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build, test and run Checkstyle
        run: ./gradlew clean check build --no-daemon

  container:
    name: Build and Scan Container
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            .

      - name: Scan HIGH vulnerabilities as warnings
        # uses: aquasecurity/trivy-action@0.28.0
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          severity: HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Block CRITICAL vulnerabilities
        # uses: aquasecurity/trivy-action@0.28.0
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Add latest tag on master
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          docker tag \
            "${IMAGE_NAME}:${GITHUB_SHA}" \
            "${IMAGE_NAME}:latest"